<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#050506"/>
  
  <!-- Subtle Gradient Background glow -->
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(30, 41, 59);stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" style="stop-color:rgb(255, 255, 255);stop-opacity:0.1" />
        <stop offset="100%" style="stop-color:rgb(30, 41, 59);stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Center "Breathing" Orb -->
  <circle cx="600" cy="315" r="150" fill="url(#orb)" filter="blur(40px)" opacity="0.8" />

  <!-- Text -->
  <text x="600" y="300" font-family="sans-serif" font-size="80" font-weight="300" fill="#cbd5e1" text-anchor="middle" letter-spacing="0.1em">NOISE &amp; BEATS</text>
  
  <text x="600" y="360" font-family="sans-serif" font-size="24" font-weight="400" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.3em">BROWSER AUDIO INSTRUMENT</text>

</svg>
